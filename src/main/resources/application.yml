server:
  port: 8080

spring:
  application:
    name: tournament-viz-backend
  datasource:
    url: jdbc:h2:mem:tournament_viz;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

app:
  security:
    # Demo-only key. In a production deployment this must come from a secrets manager.
    # Must be at least 256 bits for HS256 (jjwt WeakKeyException if shorter).
    jwt-secret: "change-me-in-production-change-me-in-production-1234567890"
    jwt-issuer: "tournament-viz"
    jwt-expiry-seconds: 3600
  startgg:
    mode: fixture
    # When mode=real, the following are intended for Start.gg API usage.
    api-key: ""
    base-url: "https://api.start.gg"

